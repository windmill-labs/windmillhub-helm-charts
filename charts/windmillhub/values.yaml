hub:
  databaseUrl: postgres://postgres:windmill@windmill-hub-postgresql/windmillhub?sslmode=disable
  appUrl: https://app.mywindmill.dev
  privateHub: true
  image: ghcr.io/windmill-labs/windmillhub-ee-public
  tag: ""
  licenseKey: "LICENSE_KEY"
  # Notify a GitHub content repo on script create/approve (drives its review-PR sync); set both to enable.
  githubDispatchRepo: "" # "owner/repo" of the content repo
  # githubDispatchToken: "" # inline token, or use the Secret ref below
  githubDispatchTokenSecret:
    name: "" # existing Secret holding the token
    key: ""
  annotations: {}
  className: ""
  tls: []
  extraEnv: []
  affinity: {}

postgresql:
  enabled: false
  fullnameOverride: windmill-hub-postgresql
  primary:
    persistence:
      enabled: true
    resources:
      limits:
        memory: "2Gi"
      requests:
        cpu: "1"
        memory: "1024Mi"
  auth:
    postgresPassword: windmill
    database: windmillhub
